<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f17;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 280px;
      background: #1a1a2e;
      border-right: 1px solid #2d2d44;
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      gap: 16px;
      flex-shrink: 0;
    }

    #sidebar h1 { font-size: 20px; font-weight: 700; color: #a78bfa; }
    #sidebar h1 span { font-size: 24px; }

    label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }

    select, textarea {
      width: 100%;
      background: #0f0f17;
      border: 1px solid #2d2d44;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 8px 10px;
      font-size: 14px;
      margin-top: 6px;
    }

    textarea { resize: vertical; min-height: 80px; }

    #repo-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 200px;
      overflow-y: auto;
    }

    .repo-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
    }
    .repo-item:hover { background: #2d2d44; }
    .repo-item.unavailable { opacity: 0.4; }

    #clear-btn {
      margin-top: auto;
      background: #2d2d44;
      border: none;
      color: #e2e8f0;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    #clear-btn:hover { background: #3d3d54; }

    /* ── Main ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      padding: 20px 28px 16px;
      border-bottom: 1px solid #2d2d44;
    }
    #header h2 { font-size: 18px; font-weight: 600; }
    #header p  { font-size: 13px; color: #64748b; margin-top: 2px; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .user .avatar   { background: #4f46e5; }
    .assistant .avatar { background: #059669; }

    .bubble {
      background: #1e1e2e;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 760px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .user .bubble { background: #312e81; }

    /* Code blocks inside bubbles */
    .bubble code {
      background: #0f0f17;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
    }
    .bubble pre {
      background: #0f0f17;
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble pre code { background: none; padding: 0; }

    .thinking { color: #64748b; font-style: italic; font-size: 13px; }

    /* ── Input bar ── */
    #input-area {
      padding: 16px 28px;
      border-top: 1px solid #2d2d44;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: #1e1e2e;
      border: 1px solid #2d2d44;
      border-radius: 12px;
      color: #e2e8f0;
      padding: 12px 16px;
      font-size: 14px;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      line-height: 1.5;
    }
    #user-input:focus { outline: none; border-color: #4f46e5; }

    #send-btn {
      background: #4f46e5;
      border: none;
      border-radius: 10px;
      color: white;
      width: 48px;
      height: 48px;
      cursor: pointer;
      font-size: 20px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #send-btn:hover { background: #4338ca; }
    #send-btn:disabled { background: #2d2d44; cursor: not-allowed; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d2d44; border-radius: 3px; }
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<div id="sidebar">
  <h1><span>🧠</span> RAG Chat</h1>

  <div>
    <label>Model</label>
    <select id="model-select">
      <option value="gpt-4o">GPT-4o</option>
      <option value="gpt-4o-mini">GPT-4o mini</option>
    </select>
  </div>

  <div>
    <label>System Prompt</label>
    <textarea id="system-prompt">You are a RAG engineering expert. Be concise and give code examples.</textarea>
  </div>

  <div>
    <label>
      <input type="checkbox" id="use-repos" checked style="margin-right:6px;"/>
      Use Repo Context
    </label>
  </div>

  <div id="repos-section">
    <label>Filter Repos <span id="repo-count" style="color:#4f46e5"></span></label>
    <div id="repo-list">Loading repos...</div>
  </div>

  <button id="clear-btn">🗑 Clear Chat</button>
</div>

<!-- ── Main ── -->
<div id="main">
  <div id="header">
    <h2>Chat with your AI knowledge base</h2>
    <p>Powered by GPT-4o + GitHub repo context</p>
  </div>

  <div id="messages">
    <div class="message assistant">
      <div class="avatar">🤖</div>
      <div class="bubble">Hi! Ask me anything about RAG, embeddings, or your repos. I'll search the cached GitHub repos for relevant context before answering.</div>
    </div>
  </div>

  <div id="input-area">
    <textarea id="user-input" placeholder="Ask about RAG, chunking, embeddings..." rows="1"></textarea>
    <button id="send-btn">➤</button>
  </div>
</div>

<script>
  const API = 'http://localhost:8000';
  let history = [];
  let selectedRepos = new Set();

  // ── Load repos ────────────────────────────────────────────────────────────
  async function loadRepos() {
    try {
      const res = await fetch(`${API}/repos`);
      const data = await res.json();
      const list = document.getElementById('repo-list');
      const available = data.repos.filter(r => r.available);
      document.getElementById('repo-count').textContent = `(${available.length} available)`;
      list.innerHTML = '';
      data.repos.forEach(repo => {
        const div = document.createElement('div');
        div.className = 'repo-item' + (repo.available ? '' : ' unavailable');
        div.innerHTML = `<input type="checkbox" ${repo.available ? '' : 'disabled'} value="${repo.name}"> ${repo.name}`;
        if (repo.available) {
          div.querySelector('input').addEventListener('change', e => {
            if (e.target.checked) selectedRepos.add(repo.name);
            else selectedRepos.delete(repo.name);
          });
        }
        list.appendChild(div);
      });
    } catch (e) {
      document.getElementById('repo-list').textContent = 'Backend not running';
    }
  }

  // ── Append message ────────────────────────────────────────────────────────
  function appendMessage(role, content = '') {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `
      <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
      <div class="bubble">${escapeHtml(content)}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div.querySelector('.bubble');
  }

  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Send message ──────────────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('user-input');
    const message = input.value.trim();
    if (!message) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;

    appendMessage('user', message);
    const bubble = appendMessage('assistant', '');
    bubble.innerHTML = '<span class="thinking">Thinking...</span>';

    try {
      const res = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message,
          history,
          repos: [...selectedRepos],
          model: document.getElementById('model-select').value,
          system_prompt: document.getElementById('system-prompt').value,
          use_repo_context: document.getElementById('use-repos').checked,
        }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let full = '';
      bubble.textContent = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const lines = decoder.decode(value).split('\n');
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const chunk = line.slice(6);
          if (chunk === '[DONE]') break;
          full += chunk;
          bubble.textContent = full;
          document.getElementById('messages').scrollTop = 99999;
        }
      }

      history.push({ role: 'user', content: message });
      history.push({ role: 'assistant', content: full });
      if (history.length > 20) history = history.slice(-20);

    } catch (e) {
      bubble.innerHTML = `<span style="color:#f87171">Error: ${e.message}. Is the backend running?</span>`;
    }

    document.getElementById('send-btn').disabled = false;
    document.getElementById('user-input').focus();
  }

  // ── Event listeners ───────────────────────────────────────────────────────
  document.getElementById('send-btn').addEventListener('click', sendMessage);

  document.getElementById('user-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  document.getElementById('user-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 160) + 'px';
  });

  document.getElementById('clear-btn').addEventListener('click', () => {
    history = [];
    const msgs = document.getElementById('messages');
    msgs.innerHTML = `<div class="message assistant"><div class="avatar">🤖</div><div class="bubble">Chat cleared. Ask me anything!</div></div>`;
  });

  document.getElementById('use-repos').addEventListener('change', e => {
    document.getElementById('repos-section').style.opacity = e.target.checked ? '1' : '0.4';
  });

  loadRepos();
</script>
</body>
</html>
